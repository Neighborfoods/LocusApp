version: "3.9"

services:
  # ── PostgreSQL 16 + PostGIS (host 5433 to avoid conflict with other projects) ─
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: locus_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-locus}
      POSTGRES_USER: ${DB_USER:-locus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    volumes:
      - locus_db_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-locus} -d ${DB_NAME:-locus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: locus_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - locus_redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Go API (bind 0.0.0.0 inside container so host/mobile can reach it) ─────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: locus_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BIND_ADDRESS: "0.0.0.0"
      PORT: "8080"
      DATABASE_URL: postgres://${DB_USER:-locus}:${DB_PASSWORD}@db:5432/${DB_NAME:-locus}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
    ports:
      - "9000:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: locus_nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  locus_db_data:
  locus_redis_data:

networks:
  default:
    name: locus_network
