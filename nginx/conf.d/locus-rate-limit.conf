# Rate limit zone for Locus API. Must be included in the http {} block.
# On Ubuntu: sudo cp /path/to/repo/nginx/conf.d/locus-rate-limit.conf /etc/nginx/conf.d/
# (Default nginx.conf already includes include /etc/nginx/conf.d/*.conf; in http.)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
